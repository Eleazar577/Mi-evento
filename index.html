<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobanana Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .card { background: #161616; border-radius: 20px; border: 1px solid #2a2a2a; padding: 15px; }
        .btn-active { animation: pulse 1.5s infinite; background-color: #dc2626 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .progress-container { background: #262626; border-radius: 10px; height: 10px; overflow: hidden; }
        #barEficiencia { width: 0%; height: 100%; transition: width 0.5s ease; background: #ef4444; }
        .oro { background: linear-gradient(90deg, #ffd700, #fff5b1, #ffd700) !important; box-shadow: 0 0 15px #ffd700; }
        input[type="number"] { background: #262626; border: 1px solid #404040; color: #fbbf24; text-align: center; border-radius: 10px; padding: 5px; width: 100%; font-weight: bold; }
        @media (max-height: 500px) { .hide-on-split { display: none !important; } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <div class="text-center mb-4">
            <p id="relojActual" class="text-5xl font-black text-white tracking-tighter">00:00</p>
            <p id="tiempoJornada" class="text-[10px] font-bold text-yellow-500 uppercase tracking-widest">Fuera de Servicio</p>
        </div>

        <div class="card border-blue-500/50 mb-3 text-center">
            <button id="btnFichaje" onclick="gestionarJornada()" class="w-full bg-zinc-800 border border-zinc-700 h-12 rounded-xl font-black text-xs uppercase text-blue-400">
                Comenzar Turno
            </button>
        </div>

        <div class="card border-zinc-800 mb-3 py-3">
            <div class="flex justify-between items-center mb-1">
                <p class="text-[9px] font-black text-gray-500 uppercase italic">Eficiencia GPS en vivo</p>
                <p id="txtPorcentaje" class="text-[10px] font-black text-yellow-500">0%</p>
            </div>
            <div class="progress-container">
                <div id="barEficiencia"></div>
            </div>
            <div class="flex justify-between mt-2 text-[8px] font-bold text-gray-600 uppercase">
                <span>Total Hoy: <span id="kmTotalesGps" class="text-white">0.0</span> km</span>
                <span>Con Pasaje: <span id="kmPasajeGps" class="text-blue-400">0.0</span> km</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-3">
            <div class="card p-2 text-center border-orange-500/20">
                <p class="text-[8px] text-gray-500 uppercase">Meta Diaria</p>
                <input type="number" id="metaIngreso" value="1500" class="bg-transparent text-white text-sm font-black focus:outline-none" onchange="actualizarUI()">
                <div class="w-full bg-zinc-800 h-1 rounded-full mt-1">
                    <div id="progresoMeta" class="bg-orange-500 h-full rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <div class="card p-2 text-center border-purple-500/20">
                <p class="text-[8px] text-gray-500 uppercase">Gasto Rápido</p>
                <div class="flex justify-around mt-1">
                    <button onclick="agregarGasto(20)" class="text-[9px] bg-purple-900/30 px-2 py-1 rounded text-purple-300">$20</button>
                    <button onclick="agregarGasto(50)" class="text-[9px] bg-purple-900/30 px-2 py-1 rounded text-purple-300">$50</button>
                    <button onclick="promptGasto()" class="text-[9px] bg-purple-900/30 px-2 py-1 rounded text-purple-300">...</button>
                </div>
            </div>
        </div>

        <div class="card border-yellow-500/30 mb-3 hide-on-split">
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="odoInicio" placeholder="KM Inicial">
                <input type="number" id="odoFin" placeholder="KM Final">
            </div>
        </div>

        <div class="card mb-3 bg-gradient-to-br from-green-900/40 to-black border-green-700 py-3 text-center">
            <p class="text-green-500 text-[8px] font-bold uppercase">Utilidad Neta Libre</p>
            <h2 id="totalNeto" class="text-5xl font-black text-white">$ 0.00</h2>
        </div>

        <div class="flex gap-2 mb-4">
            <button id="btnViaje" onclick="toggleViaje()" class="flex-[2] bg-blue-600 h-14 rounded-2xl font-black text-lg uppercase shadow-lg">Iniciar Viaje</button>
            <button id="btnCancelar" onclick="cancelarError()" class="hidden flex-1 bg-zinc-800 h-14 rounded-2xl font-bold text-[10px] text-red-500 border border-red-900/30 uppercase">Error</button>
        </div>

        <div class="hide-on-split">
            <button onclick="descargarReporte()" class="w-full bg-zinc-800 h-10 rounded-xl font-bold text-[10px] text-blue-400 border border-zinc-700 uppercase mb-2">Descargar Reporte</button>
            <button onclick="limpiarTodo()" class="w-full h-8 text-[9px] text-red-900 font-bold uppercase">Reiniciar Jornada</button>
            <div id="listaViajes" class="mt-4 space-y-2"></div>
        </div>
    </div>

    <script>
        let watchJornada = null, watchViaje = null, lastPosJornada = null, lastPosViaje = null;
        let kmTotalJornadaGps = parseFloat(localStorage.getItem('kmTotalJornadaGps')) || 0;
        let kmPasajeCerrado = parseFloat(localStorage.getItem('kmPasajeCerrado')) || 0;
        let kmViajeActual = 0, totalNetoDay = parseFloat(localStorage.getItem('totalNetoDay')) || 0;
        let gastosExtra = parseFloat(localStorage.getItem('gastosExtra')) || 0;
        let historialViajes = JSON.parse(localStorage.getItem('historialViajes')) || [];
        let inicioJornada = parseInt(localStorage.getItem('inicioJornada')) || null;
        let jornadaActiva = localStorage.getItem('jornadaActiva') === 'true';
        let config = JSON.parse(localStorage.getItem('nanobanana_config')) || { precioGas: 24, kmL: 14, mantKm: 0.50 };

        function gestionarJornada() {
            if (!jornadaActiva) {
                if(confirm("¿Iniciar turno? Se activará el GPS de jornada.")) {
                    jornadaActiva = true;
                    inicioJornada = Date.now();
                    iniciarRastreadorJornada();
                }
            } else {
                if(confirm("¿Cerrar turno? Se descargará el reporte y limpiará la jornada.")) {
                    descargarReporte();
                    limpiarTodo();
                    return;
                }
            }
            actualizarUI();
        }

        function iniciarRastreadorJornada() {
            if (navigator.geolocation && jornadaActiva) {
                watchJornada = navigator.geolocation.watchPosition((p) => {
                    if (lastPosJornada) {
                        const d = calcularDistancia(lastPosJornada, p);
                        if (d > 0.002) { kmTotalJornadaGps += d; actualizarUI(); }
                    }
                    lastPosJornada = p;
                }, null, { enableHighAccuracy: true });
            }
        }

        async function toggleViaje() {
            if (!jornadaActiva) { alert("Inicia turno primero."); return; }
            const btn = document.getElementById('btnViaje');
            const btnCan = document.getElementById('btnCancelar');
            if (watchViaje === null) {
                kmViajeActual = 0; lastPosViaje = null;
                watchViaje = navigator.geolocation.watchPosition((p) => {
                    if (lastPosViaje) {
                        const d = calcularDistancia(lastPosViaje, p);
                        if (d > 0.002) { kmViajeActual += d; actualizarUI(); }
                    }
                    lastPosViaje = p;
                }, null, { enableHighAccuracy: true });
                btn.innerText = "Finalizar"; btn.classList.add('btn-active');
                btnCan.classList.remove('hidden');
            } else {
                navigator.geolocation.clearWatch(watchViaje); watchViaje = null;
                let cobro = prompt("Cobro del viaje:");
                if (cobro && !isNaN(cobro)) registrarViaje(parseFloat(cobro), kmViajeActual);
                kmViajeActual = 0;
                btn.innerText = "Iniciar Viaje"; btn.classList.remove('btn-active');
                btnCan.classList.add('hidden');
                actualizarUI();
            }
        }

        function registrarViaje(cobro, km) {
            const tax = cobro * 0.16225;
            const gas = (km / config.kmL) * config.precioGas;
            const mant = km * config.mantKm;
            const neta = cobro - tax - gas - mant;
            kmPasajeCerrado += km;
            totalNetoDay += neta;
            historialViajes.unshift({ hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), km: km.toFixed(2), u: neta.toFixed(2), cobro: cobro });
            actualizarUI();
        }

        function agregarGasto(m) { gastosExtra += m; actualizarUI(); }
        function promptGasto() { let v = prompt("Monto del gasto:"); if(v && !isNaN(v)) agregarGasto(parseFloat(v)); }

        function actualizarUI() {
            localStorage.setItem('kmTotalJornadaGps', kmTotalJornadaGps);
            localStorage.setItem('kmPasajeCerrado', kmPasajeCerrado);
            localStorage.setItem('totalNetoDay', totalNetoDay);
            localStorage.setItem('historialViajes', JSON.stringify(historialViajes));
            localStorage.setItem('jornadaActiva', jornadaActiva);
            localStorage.setItem('inicioJornada', inicioJornada);
            localStorage.setItem('gastosExtra', gastosExtra);

            document.getElementById('kmTotalesGps').innerText = kmTotalJornadaGps.toFixed(2);
            document.getElementById('kmPasajeGps').innerText = (kmPasajeCerrado + kmViajeActual).toFixed(2);
            document.getElementById('totalNeto').innerText = "$ " + (totalNetoDay - gastosExtra).toFixed(2);
            
            const btnF = document.getElementById('btnFichaje');
            btnF.innerText = jornadaActiva ? "Cerrar Turno" : "Comenzar Turno";
            btnF.classList.toggle('text-red-500', jornadaActiva);

            // Eficiencia
            const kmProd = kmPasajeCerrado + kmViajeActual;
            const bar = document.getElementById('barEficiencia');
            if (kmTotalJornadaGps > 0) {
                const porc = Math.min(100, (kmProd / kmTotalJornadaGps) * 100);
                bar.style.width = porc + "%";
                document.getElementById('txtPorcentaje').innerText = Math.round(porc) + "%";
                bar.classList.toggle('oro', porc >= 85);
            }

            // Meta
            let brutoTotal = 0; historialViajes.forEach(v => brutoTotal += v.cobro);
            const meta = parseFloat(document.getElementById('metaIngreso').value) || 1;
            document.getElementById('progresoMeta').style.width = Math.min(100, (brutoTotal / meta) * 100) + "%";
        }

        function calcularDistancia(p1, p2) {
            const R = 6371;
            const dLat = (p2.coords.latitude - p1.coords.latitude) * Math.PI/180;
            const dLon = (p2.coords.longitude - p1.coords.longitude) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.coords.latitude*Math.PI/180)*Math.cos(p2.coords.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        setInterval(() => {
            document.getElementById('relojActual').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
            if (jornadaActiva) {
                const diff = Date.now() - inicioJornada;
                const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
                document.getElementById('tiempoJornada').innerText = `En Turno: ${h}h ${m}m`;
            } else { document.getElementById('tiempoJornada').innerText = "Fuera de Servicio"; }
        }, 1000);

        function descargarReporte() {
            let csv = `REPORTE JORNADA\nKM Jornada GPS,${kmTotalJornadaGps.toFixed(2)}\nGastos Extra,${gastosExtra}\n\n`;
            csv += `Hora,KM,Cobro,Utilidad_Neta\n`;
            historialViajes.forEach(v => { csv += `${v.hora},${v.km},${v.cobro},${v.u}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `Reporte_${new Date().toISOString().slice(0,10)}.csv`; a.click();
        }

        function limpiarTodo() { localStorage.clear(); location.reload(); }
        function cancelarError() { if(confirm("¿Cancelar viaje?")) { navigator.geolocation.clearWatch(watchViaje); watchViaje = null; kmViajeActual = 0; actualizarUI(); location.reload(); } }

        if(jornadaActiva) iniciarRastreadorJornada();
        actualizarUI();
    </script>
</body>
</html>
