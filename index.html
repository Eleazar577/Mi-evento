<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobanana v4.8 Expert 🍌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .card { background: #161616; border-radius: 20px; border: 1px solid #2a2a2a; padding: 15px; }
        #map { height: 220px; width: 100%; border-radius: 20px; border: 1px solid #333; z-index: 10; }
        .btn-active { animation: pulse 1.2s infinite; background-color: #dc2626 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        input[type="number"] { background: #262626; border: 1px solid #404040; color: #fbbf24; text-align: center; border-radius: 10px; padding: 8px; font-weight: bold; width: 100%; font-size: 14px; }
        #modalSettings { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4 pb-10">

    <button onclick="toggleSettings(true)" class="fixed top-4 right-4 z-[1001] p-2 bg-zinc-800/80 rounded-full border border-zinc-700 shadow-xl">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        </svg>
    </button>

    <div id="modalSettings">
        <div class="card w-full max-w-xs border-yellow-500/50">
            <h2 class="text-yellow-500 font-black text-center mb-4 uppercase tracking-tighter">Costos Operativos</h2>
            <div class="space-y-3">
                <div>
                    <p class="text-[9px] text-gray-400 uppercase mb-1">Precio Gasolina ($/L)</p>
                    <input type="number" id="setPrecioGas" step="0.1">
                </div>
                <div>
                    <p class="text-[9px] text-gray-400 uppercase mb-1">Rendimiento (KM/L)</p>
                    <input type="number" id="setKmPorLitro" step="0.1">
                </div>
                <div>
                    <p class="text-[9px] text-gray-400 uppercase mb-1">Manto Est. ($/KM)</p>
                    <input type="number" id="setMantKm" step="0.1">
                </div>
                <div>
                    <p class="text-[9px] text-gray-400 uppercase mb-1">% Comisión App (Uber/Didi)</p>
                    <input type="number" id="setComisionApp" step="1">
                </div>
                <button onclick="guardarAjustes()" class="w-full bg-yellow-500 text-black font-black py-3 rounded-xl uppercase text-xs mt-2">Guardar Cambios</button>
                <button onclick="toggleSettings(false)" class="w-full text-gray-500 text-[10px] uppercase font-bold">Cerrar</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-end mb-4 px-1">
            <div>
                <h1 class="text-[9px] font-black text-yellow-500 tracking-[0.2em] uppercase">Logistics Edition</h1>
                <p id="relojActual" class="text-4xl font-black text-white leading-none">00:00</p>
            </div>
            <div class="text-right">
                <p id="tiempoJornada" class="text-xl font-black text-yellow-500">00:00</p>
            </div>
        </div>

        <div id="map" class="mb-4"></div>

        <div class="card mb-3 bg-zinc-900/50">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[8px] font-bold text-green-500 uppercase tracking-tighter">Utilidad Neta</span>
                <span id="totalNeto" class="text-2xl font-black text-white">$ 0.00</span>
            </div>
            <div class="w-full h-2.5 bg-zinc-800 rounded-full flex overflow-hidden">
                <div id="barUtilidad" class="bg-green-500" style="width: 100%"></div>
                <div id="barGastos" class="bg-orange-600" style="width: 0%"></div>
            </div>
        </div>

        <button id="btnViaje" onclick="toggleViaje()" class="w-full h-16 bg-blue-600 rounded-2xl font-black text-lg uppercase shadow-lg mb-3">
            Iniciar Viaje
        </button>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="card p-2 text-center">
                <p class="text-[7px] text-gray-500 uppercase">Recorrido Total</p>
                <p id="totalKm" class="text-sm font-black text-white">0.00 km</p>
            </div>
            <div class="card p-2 text-center">
                <p class="text-[7px] text-gray-500 uppercase">Cobro Bruto</p>
                <p id="txtMontoBruto" class="text-sm font-black text-green-500">$ 0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <input type="number" id="odoInicio" placeholder="Odóm. Inicio" onchange="saveData()">
            <input type="number" id="odoFin" placeholder="Odóm. Fin" onchange="saveData()">
            <button onclick="compartirWhatsApp()" class="card py-2 text-[10px] font-black text-green-500 uppercase">WhatsApp</button>
            <button onclick="limpiarTodo()" class="card py-2 text-[10px] font-black text-red-600 uppercase">Reiniciar</button>
        </div>

        <div id="listaViajes" class="space-y-2"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, activeLine, deadLine, deadCoords = [], activeCoords = [];
        let watchId = null, lastPos = null, kmViajeActual = 0, isViajeActivo = false;
        
        // Carga inicial de configuración
        let config = JSON.parse(localStorage.getItem('nanobanana_config')) || { 
            precioGas: 24.5, 
            kmL: 12, 
            mantKm: 0.60,
            comisionApp: 25 // Nuevo campo
        };

        let totalKmDay = parseFloat(localStorage.getItem('totalKmDay')) || 0;
        let totalNetoDay = parseFloat(localStorage.getItem('totalNetoDay')) || 0;
        let historialViajes = JSON.parse(localStorage.getItem('historialViajes')) || [];
        let inicioJornada = parseInt(localStorage.getItem('inicioJornada')) || Date.now();

        function toggleSettings(show) {
            const modal = document.getElementById('modalSettings');
            if(show) {
                document.getElementById('setPrecioGas').value = config.precioGas;
                document.getElementById('setKmPorLitro').value = config.kmL;
                document.getElementById('setMantKm').value = config.mantKm;
                document.getElementById('setComisionApp').value = config.comisionApp;
                modal.style.display = 'flex';
            } else { modal.style.display = 'none'; }
        }

        function guardarAjustes() {
            config.precioGas = parseFloat(document.getElementById('setPrecioGas').value) || 24.5;
            config.kmL = parseFloat(document.getElementById('setKmPorLitro').value) || 12;
            config.mantKm = parseFloat(document.getElementById('setMantKm').value) || 0.60;
            config.comisionApp = parseFloat(document.getElementById('setComisionApp').value) || 0;
            localStorage.setItem('nanobanana_config', JSON.stringify(config));
            toggleSettings(false);
            updateDisplay();
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([20.6, -103.3], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            marker = L.circleMarker([0,0], { radius: 7, color: '#fff', fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
            activeLine = L.polyline([], { color: '#3b82f6', weight: 5 }).addTo(map);
            deadLine = L.polyline([], { color: '#ef4444', weight: 2, dashArray: '5,10', opacity: 0.5 }).addTo(map);

            startGPS();
        }

        function startGPS() {
            watchId = navigator.geolocation.watchPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                map.panTo(pos);
                marker.setLatLng(pos);
                if (lastPos) {
                    const d = calcularDistancia(lastPos.coords, p.coords);
                    if (d > 0.007) {
                        totalKmDay += d;
                        if(isViajeActivo) {
                            kmViajeActual += d;
                            activeCoords.push(pos);
                            activeLine.setLatLngs(activeCoords);
                        } else {
                            deadCoords.push(pos);
                            deadLine.setLatLngs(deadCoords);
                        }
                        updateDisplay(); saveData();
                    }
                }
                lastPos = p;
            }, null, { enableHighAccuracy: true });
        }

        function toggleViaje() {
            const btn = document.getElementById('btnViaje');
            if (!isViajeActivo) {
                isViajeActivo = true; kmViajeActual = 0; activeCoords = [];
                activeLine.setLatLngs([]);
                btn.innerText = "Finalizar Viaje"; btn.classList.add('btn-active');
            } else {
                isViajeActivo = false;
                let cobro = prompt("Monto cobrado en App ($):");
                if (cobro) registrarViaje(parseFloat(cobro), kmViajeActual, lastPos.coords);
                btn.innerText = "Iniciar Viaje"; btn.classList.remove('btn-active');
            }
        }

        function registrarViaje(c, k, coords) {
            const comision = c * (config.comisionApp / 100);
            const impuestos = c * 0.16225; // Impuestos base
            const gas = (k / config.kmL) * config.precioGas;
            const mantenimiento = k * config.mantKm;
            const neta = c - comision - impuestos - gas - mantenimiento;
            
            historialViajes.unshift({
                id: Date.now(),
                hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                km: k.toFixed(2),
                u: neta.toFixed(2),
                cobro: c,
                ruta: activeCoords
            });
            totalNetoDay += neta;
            saveData(); updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('totalKm').innerText = totalKmDay.toFixed(2) + " km";
            document.getElementById('totalNeto').innerText = "$ " + totalNetoDay.toFixed(2);
            let bruto = historialViajes.reduce((acc, v) => acc + v.cobro, 0);
            document.getElementById('txtMontoBruto').innerText = "$ " + bruto.toFixed(2);
            
            const porc = bruto > 0 ? Math.max(0, (totalNetoDay / bruto) * 100) : 100;
            document.getElementById('barUtilidad').style.width = porc + "%";
            document.getElementById('barGastos').style.width = (100 - porc) + "%";

            document.getElementById('listaViajes').innerHTML = historialViajes.map(v => `
                <div class="card p-3 flex justify-between items-center mb-1 border-l-4 border-blue-600">
                    <div><span class="text-[8px] text-gray-500">${v.hora}</span><p class="text-xs font-bold text-white">${v.km} KM</p></div>
                    <p class="text-green-500 font-black">$${v.u}</p>
                </div>`).join("");
        }

        function calcularDistancia(p1, p2) {
            const R = 6371;
            const dLat = (p2.latitude - p1.latitude) * Math.PI/180;
            const dLon = (p2.longitude - p1.longitude) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.latitude*Math.PI/180)*Math.cos(p2.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function saveData() {
            localStorage.setItem('totalKmDay', totalKmDay);
            localStorage.setItem('totalNetoDay', totalNetoDay);
            localStorage.setItem('historialViajes', JSON.stringify(historialViajes));
            localStorage.setItem('odoInicio', document.getElementById('odoInicio').value);
            localStorage.setItem('odoFin', document.getElementById('odoFin').value);
        }

        function compartirWhatsApp() {
            const t = `*NANOBANANA V4.8*\n💰 Utilidad Neta: $${totalNetoDay.toFixed(2)}\n🚗 Recorrido: ${totalKmDay.toFixed(2)}km\n⛽ Gas: $${((totalKmDay/config.kmL)*config.precioGas).toFixed(2)}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
        }

        function limpiarTodo() { if(confirm("¿Reiniciar jornada?")) { localStorage.clear(); location.reload(); } }

        setInterval(() => {
            document.getElementById('relojActual').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
            const d = Date.now() - inicioJornada;
            const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000);
            document.getElementById('tiempoJornada').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        }, 1000);

        initMap();
        document.getElementById('odoInicio').value = localStorage.getItem('odoInicio') || "";
        document.getElementById('odoFin').value = localStorage.getItem('odoFin') || "";
        updateDisplay();
    </script>
</body>
</html>
