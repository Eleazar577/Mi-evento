<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobanana v5.9 Pro 🍌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card { background: #161616; border-radius: 20px; border: 1px solid #2a2a2a; padding: 15px; }
        #map { height: 100vh; width: 100%; z-index: 10; }
        .btn-active { animation: pulse 1.2s infinite; background-color: #dc2626 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .page { display: none; }
        .page.active { display: block; }
        input[type="number"] { background: #262626; border: 1px solid #404040; color: #fbbf24; text-align: center; border-radius: 10px; padding: 8px; font-weight: bold; width: 100%; }
        #modalSettings { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .btn-float { position: fixed; bottom: 20px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="p-4 pb-24">

    <div id="modalSettings">
        <div class="card w-full max-w-xs border-yellow-500/50">
            <h2 class="text-yellow-500 font-black text-center mb-4 uppercase tracking-tighter">Costos Operativos</h2>
            <div class="space-y-3">
                <input type="number" id="setPrecioGas" placeholder="Precio Gasolina ($/L)">
                <input type="number" id="setKmPorLitro" placeholder="Rendimiento (KM/L)">
                <input type="number" id="setMantKm" placeholder="Manto Est. ($/KM)">
                <input type="number" id="setComisionApp" placeholder="% Comisión App">
                <button onclick="guardarAjustes()" class="w-full bg-yellow-500 text-black font-black py-3 rounded-xl uppercase text-xs mt-2">Guardar</button>
                <button onclick="toggleSettings(false)" class="w-full text-gray-500 text-[10px] uppercase font-bold">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="pageSummary" class="page active max-w-md mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xs font-black text-yellow-500 tracking-widest uppercase">NANOBANANA <span class="text-white">v5.9</span></h1>
            <button onclick="toggleSettings(true)" class="p-2 bg-zinc-800 rounded-full border border-zinc-700">⚙️</button>
        </div>

        <div class="card mb-4 bg-gradient-to-br from-zinc-900 to-black text-center border-zinc-800">
            <p class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Utilidad Neta Libre</p>
            <p id="totalNeto" class="text-5xl font-black text-white">$ 0.00</p>
            
            <div class="grid grid-cols-3 gap-2 text-[9px] font-bold mt-3 text-gray-400">
                <span>Servicios: <b id="txtTotalServicios" class="text-white">0</b></span>
                <span>Bruto: <b id="txtMontoBruto" class="text-white">$0.00</b></span>
                <span>Gastos: <b id="txtTotalGastos" class="text-orange-400">$0.00</b></span>
            </div>
            <div class="text-[9px] text-gray-500 mt-1">Gas: <b id="txtTotalGas" class="text-orange-400/70">$0.00</b> | Manto: <b id="txtTotalManto" class="text-orange-400/70">$0.00</b></div>
            </div>

        <button id="btnViajeMain" onclick="iniciarViaje()" class="w-full h-20 bg-blue-600 rounded-3xl font-black text-xl uppercase shadow-lg mb-4">
            Iniciar Viaje
        </button>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <input type="number" id="odoInicio" placeholder="KM Inicial" onchange="saveData()">
            <input type="number" id="odoFin" placeholder="KM Final" onchange="saveData()">
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="compartirWhatsApp()" class="card flex-1 text-center border-green-900 p-3">📲 <span class="text-xs text-white font-bold">Compartir</span></button>
            <button onclick="limpiarTodo()" class="card text-center border-red-900 p-3">🗑️</button>
        </div>
        
        <div id="listaViajes" class="space-y-2"></div>

        <button onclick="showPage('pageMap')" class="btn-float right-4 bg-zinc-800 p-4 rounded-full border border-zinc-700">🗺️</button>
    </div>

    <div id="pageMap" class="page fixed inset-0">
        <button onclick="showPage('pageSummary')" class="absolute top-4 left-4 z-[1001] bg-black/50 p-3 rounded-full text-white">⬅️</button>
        <div id="map"></div>
        
        <button id="btnFinalizarMap" onclick="finalizarViaje()" class="btn-float left-1/2 -translate-x-1/2 bg-red-600 text-white font-black py-4 px-10 rounded-full text-lg hidden">
            Finalizar Viaje
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, activeLine, deadLine, deadCoords = [], activeCoords = [];
        let watchId = null, lastPos = null, kmViajeActual = 0, isViajeActivo = false;
        let tiempoInicio = null;
        
        let rutasPasadas = JSON.parse(localStorage.getItem('rutasPasadas')) || [];
        
        let config = JSON.parse(localStorage.getItem('nanobanana_config')) || { 
            precioGas: 25.0, 
            kmL: 11.0, 
            mantKm: 0.60, 
            comisionApp: 16.225 
        };

        let totalKmDay = parseFloat(localStorage.getItem('totalKmDay')) || 0;
        let totalNetoDay = parseFloat(localStorage.getItem('totalNetoDay')) || 0;
        let historialViajes = JSON.parse(localStorage.getItem('historialViajes')) || [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'pageMap') {
                map.invalidateSize();
                dibujarRutasPasadas();
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([0, 0], 15);
            // --- CAMBIO: Mapa más claro ---
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            // ------------------------------
            
            marker = L.circleMarker([0,0], { radius: 8, color: '#2563eb', fillOpacity: 1, fillColor: '#3b82f6' }).addTo(map);
            
            activeLine = L.polyline([], { color: '#2563eb', weight: 5, opacity: 0.8 }).addTo(map);
            deadLine = L.polyline([], { color: '#ef4444', weight: 2, dashArray: '5,10', opacity: 0.5 }).addTo(map);
            
            navigator.geolocation.getCurrentPosition(p => map.setView([p.coords.latitude, p.coords.longitude], 15));
            startGPS();
        }

        function dibujarRutasPasadas() {
            if (window.layersPasadas) window.layersPasadas.forEach(l => map.removeLayer(l));
            window.layersPasadas = [];

            rutasPasadas.forEach(ruta => {
                let color = ruta.tipo === 'activo' ? '#2563eb' : '#ef4444';
                let poly = L.polyline(ruta.coords, { color: color, weight: 3, opacity: 0.5 }).addTo(map);
                window.layersPasadas.push(poly);
            });
        }

        function startGPS() {
            if(watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                map.panTo(pos); marker.setLatLng(pos);
                if (lastPos) {
                    const d = calcularDistancia(lastPos.coords, p.coords);
                    if (d > 0.007) {
                        totalKmDay += d;
                        if(isViajeActivo) {
                            kmViajeActual += d; activeCoords.push(pos);
                            activeLine.setLatLngs(activeCoords);
                        } else {
                            deadCoords.push(pos); deadLine.setLatLngs(deadCoords);
                        }
                        updateDisplay(); saveData();
                    }
                }
                lastPos = p;
            }, null, { enableHighAccuracy: true });
        }

        function iniciarViaje() {
            isViajeActivo = true; kmViajeActual = 0; activeCoords = [];
            tiempoInicio = new Date();
            
            if (deadCoords.length > 0) {
                rutasPasadas.push({tipo: 'espera', coords: deadCoords});
                deadCoords = [];
                deadLine.setLatLngs([]);
            }

            activeLine.setLatLngs([]);
            document.getElementById('btnViajeMain').innerText = "Viaje Activo";
            document.getElementById('btnViajeMain').classList.add('btn-active');
            document.getElementById('btnFinalizarMap').classList.remove('hidden');
            showPage('pageMap');
        }

        function finalizarViaje() {
            isViajeActivo = false;
            let cobro = prompt("Monto cobrado ($):");
            if (cobro) registrarViaje(parseFloat(cobro), kmViajeActual);
            
            if (activeCoords.length > 0) {
                rutasPasadas.push({tipo: 'activo', coords: activeCoords});
            }

            document.getElementById('btnViajeMain').innerText = "Iniciar Viaje";
            document.getElementById('btnViajeMain').classList.remove('btn-active');
            document.getElementById('btnFinalizarMap').classList.add('hidden');
            showPage('pageSummary');
            saveData();
        }

        function registrarViaje(c, k) {
            const costoComision = c * (config.comisionApp / 100);
            const gastoGas = (k / config.kmL) * config.precioGas;
            const gastoManto = k * config.mantKm;
            const neta = c - costoComision - gastoGas - gastoManto;
            
            const tiempoFin = new Date();
            const minutosViaje = Math.round((tiempoFin - tiempoInicio) / 60000);

            historialViajes.unshift({
                hora: tiempoInicio.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 
                km: k.toFixed(2), 
                u: neta.toFixed(2), 
                cobro: c,
                tiempo: minutosViaje,
                gas: gastoGas.toFixed(2),
                impuesto: costoComision.toFixed(2)
            });
            
            totalNetoDay += neta;
            saveData(); 
            updateDisplay();
        }

        // --- FUNCIÓN CORREGIDA v5.9 (Más datos en reporte) ---
        function updateDisplay() {
            document.getElementById('totalNeto').innerText = "$ " + totalNetoDay.toFixed(2);
            
            let bruto = historialViajes.reduce((acc, v) => acc + parseFloat(v.cobro), 0);
            let totalGas = historialViajes.reduce((acc, v) => acc + parseFloat(v.gas), 0);
            let totalManto = historialViajes.reduce((acc, v) => acc + (parseFloat(v.km) * config.mantKm), 0);
            
            document.getElementById('txtTotalServicios').innerText = historialViajes.length;
            document.getElementById('txtMontoBruto').innerText = "$" + bruto.toFixed(2);
            document.getElementById('txtTotalGastos').innerText = "$" + (totalGas + totalManto).toFixed(2);
            document.getElementById('txtTotalGas').innerText = "$" + totalGas.toFixed(2);
            document.getElementById('txtTotalManto').innerText = "$" + totalManto.toFixed(2);
            
            document.getElementById('listaViajes').innerHTML = historialViajes.map(v => `
                <div class="card p-3 text-sm">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-white font-bold">${v.hora} - <b class="text-white/70">$${v.cobro}</b></span>
                        <span class="text-green-500 font-black text-lg">+$${v.u}</span>
                    </div>
                    <div class="grid grid-cols-4 gap-1 text-[10px] text-gray-400">
                        <span>🚀 ${v.km} km</span>
                        <span>⏱️ ${v.tiempo} min</span>
                        <span>⛽ $${v.gas}</span>
                        <span>🏛️ $${v.impuesto}</span>
                    </div>
                </div>`).join("");
        }
        // ---------------------------------------------------

        function calcularDistancia(p1, p2) {
            const R = 6371;
            const dLat = (p2.latitude - p1.latitude) * Math.PI/180;
            const dLon = (p2.longitude - p1.longitude) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.latitude*Math.PI/180)*Math.cos(p2.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function saveData() {
            localStorage.setItem('totalKmDay', totalKmDay);
            localStorage.setItem('totalNetoDay', totalNetoDay);
            localStorage.setItem('historialViajes', JSON.stringify(historialViajes));
            localStorage.setItem('rutasPasadas', JSON.stringify(rutasPasadas));
            localStorage.setItem('odoInicio', document.getElementById('odoInicio').value);
            localStorage.setItem('odoFin', document.getElementById('odoFin').value);
        }

        function toggleSettings(show) { document.getElementById('modalSettings').style.display = show ? 'flex' : 'none'; }
        
        function guardarAjustes() {
            config.precioGas = parseFloat(document.getElementById('setPrecioGas').value);
            config.kmL = parseFloat(document.getElementById('setKmPorLitro').value);
            config.mantKm = parseFloat(document.getElementById('setMantKm').value);
            config.comisionApp = parseFloat(document.getElementById('setComisionApp').value);
            localStorage.setItem('nanobanana_config', JSON.stringify(config));
            toggleSettings(false);
        }

        function compartirWhatsApp() {
            const t = `*NANOBANANA V5.9*\n💰 Utilidad: $${totalNetoDay.toFixed(2)}\n🚗 KM: ${totalKmDay.toFixed(2)}km\n🏁 Servicios: ${historialViajes.length}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
        }

        function limpiarTodo() { if(confirm("¿Reiniciar jornada?")) { localStorage.clear(); location.reload(); } }

        initMap();
        document.getElementById('odoInicio').value = localStorage.getItem('odoInicio') || "";
        document.getElementById('odoFin').value = localStorage.getItem('odoFin') || "";
        updateDisplay();
    </script>
</body>
</html>
