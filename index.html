<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#a2d2ff">
<title>BabyTracker AI Pro</title>

<style>
:root {
    --primary:#a2d2ff; --secondary:#ffafcc; --sleep:#cdb4db; --breast:#ffd166;
    --bg:#fdfcf0; --text:#495057; --card:#fff; --border:#eee;
    --danger:#ff6b6b; --safe:#51cf66; --night:#4a4e69; --med:#ff9f1c;
}
body.night-mode { --bg:#121212; --text:#e0e0e0; --card:#1e1e1e; --border:#333; }

body {
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    margin:0; color:var(--text);
    padding-bottom:60px;
}

.header {display:flex;justify-content:space-between;padding:15px;max-width:500px;margin:auto;}
.tab-bar {display:flex;max-width:500px;margin:auto;background:var(--card);}
.tab-btn {flex:1;padding:12px;border:none;background:none;font-weight:bold;color:#888;}
.tab-btn.active {color:var(--primary);border-bottom:3px solid var(--primary);}

.page {display:none;max-width:500px;margin:auto;padding:20px;}
.page.active {display:block;}

.grid-container {display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.touch-button {
    border:none;border-radius:15px;padding:15px;color:white;font-weight:bold;
}
.btn-milk{background:var(--primary);}
.btn-breast{background:var(--breast);}
.btn-diaper{background:var(--secondary);}
.btn-sleep{background:var(--sleep);}

.submenu {display:none;margin-top:10px;background:var(--card);padding:10px;border-radius:10px;}
.sub-btn {padding:10px;border-radius:8px;border:none;margin:3px;width:100%;}

.log-item {
    background:var(--card);
    padding:10px;margin:5px 0;border-radius:10px;
    display:flex;justify-content:space-between;
}

.ai-box {background:#eef9f1;padding:10px;border-radius:10px;margin-bottom:10px;}
.vigilia-box {background:#fff5f5;padding:8px;border-radius:8px;margin-bottom:10px;text-align:center;}

</style>
</head>

<body>

<div class="header">
<h3>👶 BabyTracker AI</h3>
<button onclick="toggleNightMode()">🌙</button>
</div>

<div class="tab-bar">
<button class="tab-btn active" onclick="showPage('tracker',this)">Hoy</button>
<button class="tab-btn" onclick="showPage('history',this)">Historial</button>
<button class="tab-btn" onclick="showPage('growth',this)">Pediatra</button>
</div>

<div id="tracker" class="page active">

<div id="vigilia-display" class="vigilia-box">Tiempo despierto: --</div>
<div id="ai-predictions" class="ai-box">✨ Registra datos...</div>

<div id="timer-display" style="text-align:center;font-size:1.5rem">00:00:00</div>

<div class="grid-container">
<button class="touch-button btn-milk" onclick="quickSave('Biberón','6oz',6)">🍼</button>
<button class="touch-button btn-breast" onclick="quickSave('Pecho','Izq')">🤱</button>
<button class="touch-button btn-diaper" onclick="quickSave('Pañal','Cambio')">🧷</button>
<button class="touch-button btn-sleep" onclick="toggleSleep()">😴</button>
</div>

<div id="recent-logs"></div>

</div>

<div id="history" class="page">
<input type="date" id="calendar-filter" onchange="renderHistory()">
<div id="day-logs"></div>
</div>

<div id="growth" class="page">
<input type="number" id="weight" placeholder="Peso kg">
<input type="number" id="height" placeholder="Altura cm">
<button onclick="saveGrowth()">Guardar</button>
<div id="growth-logs"></div>
</div>

<script>

// STORAGE
const getData = k => JSON.parse(localStorage.getItem(k)) || [];
const setData = (k,v)=>localStorage.setItem(k,JSON.stringify(v));

// GUARDAR LOG
function saveLog(type,detail,value=0){
    const logs = getData('logs');
    logs.unshift({
        id:Date.now(),
        type,detail,value,
        time:new Date().toLocaleTimeString()
    });
    setData('logs',logs);
    refreshUI();
}

// BOTONES RÁPIDOS
function quickSave(t,d,v=0){ saveLog(t,d,v); }

// TIMER SUEÑO
let running=false,startTime,timer;

function toggleSleep(){
    if(!running){
        running=true;
        startTime=Date.now();
        timer=setInterval(updateTimer,1000);
    }else{
        running=false;
        clearInterval(timer);
        const mins=Math.floor((Date.now()-startTime)/60000);
        saveLog('Siesta',mins+' min',mins);
        document.getElementById('timer-display').innerText="00:00:00";
    }
}

function updateTimer(){
    const d=Date.now()-startTime;
    const m=Math.floor(d/60000);
    const s=Math.floor((d%60000)/1000);
    document.getElementById('timer-display').innerText=`${m}:${s}`;
}

// IA SIMPLE
function updateAI(){
    const logs=getData('logs');
    const last=logs[0];
    if(!last) return;
    document.getElementById('ai-predictions').innerText=
    "Último evento: "+last.type;
}

// RENDER
function renderRecent(){
    const logs=getData('logs').slice(0,5);
    document.getElementById('recent-logs').innerHTML=
    logs.map(l=>`<div class="log-item"><span>${l.type}</span><span>${l.time}</span></div>`).join('');
}

function renderHistory(){
    const date=document.getElementById('calendar-filter').value;
    const logs=getData('logs');
    document.getElementById('day-logs').innerHTML=
    logs.filter(l=>l.time.includes(date)).map(l=>`<div>${l.type}</div>`).join('');
}

// CRECIMIENTO
function saveGrowth(){
    const data=getData('growth');
    data.unshift({
        date:new Date().toLocaleDateString(),
        weight:weight.value,
        height:height.value
    });
    setData('growth',data);
    renderGrowth();
}

function renderGrowth(){
    const data=getData('growth');
    document.getElementById('growth-logs').innerHTML=
    data.map(g=>`<div>${g.date} - ${g.weight}kg</div>`).join('');
}

// UI
function refreshUI(){
    renderRecent();
    updateAI();
}

function showPage(id,btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

// DARK MODE
function toggleNightMode(){
    document.body.classList.toggle('night-mode');
    localStorage.setItem('dark',document.body.classList.contains('night-mode'));
}

if(localStorage.getItem('dark')==='true'){
    document.body.classList.add('night-mode');
}

// INIT
refreshUI();

</script>

</body>
</html>
