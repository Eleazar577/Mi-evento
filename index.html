<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobanana Dual Tracker Pro 🍌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card { background: #161616; border-radius: 20px; border: 1px solid #2a2a2a; padding: 15px; }
        .btn-active { animation: pulse 1.5s infinite; background-color: #dc2626 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        
        .progress-container { background: #262626; border-radius: 10px; height: 10px; overflow: hidden; }
        #barEficiencia { width: 0%; height: 100%; transition: width 0.5s ease; background: #ef4444; }
        .oro { background: linear-gradient(90deg, #ffd700, #fff5b1, #ffd700) !important; box-shadow: 0 0 15px #ffd700; }

        input { background: #262626; border: 1px solid #404040; color: #fbbf24; border-radius: 10px; padding: 8px; }
        
        @media (max-height: 500px) {
            .hide-on-split { display: none !important; }
            #relojActual { font-size: 2.5rem !important; }
        }
        #modalSettings { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <div class="text-center mb-4">
            <p id="relojActual" class="text-6xl font-black text-white tracking-tighter">00:00</p>
            <p id="tiempoJornada" class="text-xs font-bold text-yellow-500 italic">Fuera de servicio</p>
        </div>

        <div class="card border-blue-500/50 mb-3 text-center">
            <button id="btnFichaje" onclick="gestionarJornada()" class="w-full bg-zinc-800 border border-zinc-700 h-12 rounded-xl font-black text-xs uppercase text-blue-400">
                Comenzar Turno
            </button>
        </div>

        <div class="card border-zinc-800 mb-3 py-3">
            <div class="flex justify-between items-center mb-1">
                <p class="text-[9px] font-black text-gray-500 uppercase">Eficiencia GPS en vivo</p>
                <p id="txtPorcentaje" class="text-[10px] font-black text-yellow-500">0%</p>
            </div>
            <div class="progress-container">
                <div id="barEficiencia"></div>
            </div>
            <div class="flex justify-between mt-2 text-[8px] font-bold text-gray-600 uppercase">
                <span>Total Hoy: <span id="kmTotalesGps" class="text-white">0.0</span> km</span>
                <span>Con Pasaje: <span id="kmPasajeGps" class="text-blue-400">0.0</span> km</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-3">
            <div class="card p-2 text-center border-orange-500/20">
                <p class="text-[8px] text-gray-500 uppercase">Meta Diaria (Cobro)</p>
                <input type="number" id="metaIngreso" value="1500" class="w-full bg-transparent border-none text-center text-white text-sm font-black focus:ring-0" onchange="actualizarUI()">
                <div class="w-full bg-zinc-800 h-1 rounded-full mt-1">
                    <div id="progresoMeta" class="bg-orange-500 h-full rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <div class="card p-2 border-purple-500/20">
                <p class="text-[8px] text-gray-500 uppercase text-center mb-1">Nuevo Gasto</p>
                <input type="text" id="gastoConcepto" placeholder="Qué?" class="w-full text-[9px] mb-1 p-1">
                <div class="flex gap-1">
                    <input type="number" id="gastoMonto" placeholder="$" class="w-full text-[9px] p-1 font-bold">
                    <button onclick="registrarGastoManual()" class="bg-purple-600 px-2 rounded text-white font-bold">+</button>
                </div>
            </div>
        </div>

        <div class="card mb-3 bg-gradient-to-br from-green-900/40 to-black border-green-700 py-3 text-center relative overflow-hidden">
            <p class="text-green-500 text-[8px] font-bold uppercase tracking-widest">Utilidad Neta Final</p>
            <h2 id="totalNeto" class="text-5xl font-black text-white">$ 0.00</h2>
            
            <div class="flex justify-around mt-2 border-t border-green-900/50 pt-2">
                <div>
                    <p class="text-[7px] text-gray-500 uppercase">Gasolina Est.</p>
                    <p id="costoGasolina" class="text-[10px] font-bold text-orange-400">$ 0.00</p>
                </div>
                <div>
                    <p class="text-[7px] text-gray-500 uppercase">Desgaste Est.</p>
                    <p id="costoDesgaste" class="text-[10px] font-bold text-orange-400">$ 0.00</p>
                </div>
            </div>
            
            <div id="miniListaGastos" class="mt-2 px-4 space-y-1 max-h-16 overflow-y-auto"></div>
        </div>

        <div class="flex gap-2 mb-2">
            <button id="btnViaje" onclick="toggleViaje()" class="flex-[2] bg-blue-600 h-16 rounded-2xl font-black text-lg shadow-lg uppercase">
                Iniciar Viaje
            </button>
            <button id="btnCancelar" onclick="cancelarError()" class="hidden flex-1 bg-zinc-800 h-16 rounded-2xl font-bold text-[10px] text-red-500 border border-red-900/30 uppercase">
                Error
            </button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4 px-1 text-center font-bold uppercase tracking-tighter">
            <div class="bg-zinc-900/50 rounded-lg py-1 border border-zinc-800">
                <p class="text-[7px] text-gray-500">Servicios</p>
                <p id="txtCantViajes" class="text-blue-400 text-xs font-black">Llevas 0 viajes</p>
            </div>
            <div class="bg-zinc-900/50 rounded-lg py-1 border border-zinc-800">
                <p class="text-[7px] text-gray-500">Monto Bruto</p>
                <p id="txtMontoBruto" class="text-green-500 text-xs font-black">$ 0.00</p>
            </div>
        </div>

        <div class="hide-on-split">
            <div class="card border-yellow-500/30 mb-3">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="odoInicio" placeholder="Odo Inicial" class="text-xs">
                    <input type="number" id="odoFin" placeholder="Odo Final" class="text-xs">
                </div>
            </div>
            <div class="flex gap-2 mb-2">
                <button onclick="descargarReporte()" class="flex-1 bg-zinc-800 h-10 rounded-xl font-bold text-[10px] text-blue-400 border border-zinc-700 uppercase">Descargar Reporte</button>
                <button onclick="reiniciarJornada()" class="flex-1 bg-red-900/20 h-10 rounded-xl font-bold text-[10px] text-red-500 border border-red-900/30 uppercase">Reiniciar Jornada</button>
            </div>
            <div id="listaViajes" class="space-y-2"></div>
        </div>
    </div>

    <button onclick="toggleSettings(true)" class="fixed top-2 right-2 p-2 bg-zinc-800/80 rounded-full border border-zinc-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
    </button>

    <div id="modalSettings">
        <div class="card w-full max-w-xs border-yellow-500/50 text-center">
            <h2 class="text-yellow-500 font-black mb-4 uppercase">Ajustes Operativos</h2>
            <div class="space-y-3">
                <input type="number" id="setPrecioGas" step="0.1" class="w-full" placeholder="Precio Gas">
                <input type="number" id="setKmPorLitro" step="0.1" class="w-full" placeholder="KM/L">
                <input type="number" id="setMantKm" step="0.1" class="w-full" placeholder="Manto/KM">
                <button onclick="toggleSettings(false)" class="w-full bg-yellow-500 text-black font-black py-3 rounded-xl uppercase text-xs">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let watchJornada = null, watchViaje = null, lastPosJornada = null, lastPosViaje = null;
        let kmTotalJornadaGps = parseFloat(localStorage.getItem('kmTotalJornadaGps')) || 0;
        let kmPasajeCerrado = parseFloat(localStorage.getItem('kmPasajeCerrado')) || 0;
        let kmViajeActual = 0;
        let totalNetoDay = parseFloat(localStorage.getItem('totalNetoDay')) || 0;
        let gastosExtra = parseFloat(localStorage.getItem('gastosExtra')) || 0;
        let historialViajes = JSON.parse(localStorage.getItem('historialViajes')) || [];
        let detalleGastos = JSON.parse(localStorage.getItem('detalleGastos')) || [];
        let inicioJornada = parseInt(localStorage.getItem('inicioJornada')) || Date.now();
        let jornadaActiva = localStorage.getItem('jornadaActiva') === 'true';
        let config = JSON.parse(localStorage.getItem('nanobanana_config')) || { precioGas: 24, kmL: 14, mantKm: 0.50 };

        function gestionarJornada() {
            if (!jornadaActiva) {
                if(confirm("¿Comenzar turno? Se activará el GPS.")) {
                    jornadaActiva = true;
                    inicioJornada = Date.now();
                    localStorage.setItem('inicioJornada', inicioJornada);
                    iniciarRastreadorJornada();
                }
            } else {
                if(confirm("¿Cerrar turno? Se descargará el reporte.")) {
                    descargarReporte();
                    limpiarTodo();
                }
            }
            localStorage.setItem('jornadaActiva', jornadaActiva);
            actualizarUI();
        }

        function reiniciarJornada() {
            if(confirm("¿Limpiar todos los datos de hoy?")) { limpiarTodo(); }
        }

        function limpiarTodo() {
            localStorage.clear();
            location.reload();
        }

        function iniciarRastreadorJornada() {
            if (navigator.geolocation && jornadaActiva) {
                watchJornada = navigator.geolocation.watchPosition((p) => {
                    if (lastPosJornada) {
                        const d = calcularDistancia(lastPosJornada, p);
                        if (d > 0.002) { kmTotalJornadaGps += d; actualizarUI(); }
                    }
                    lastPosJornada = p;
                }, null, { enableHighAccuracy: true });
            }
        }

        async function toggleViaje() {
            if (!jornadaActiva) return alert("Primero debes 'Comenzar Turno'");
            const btn = document.getElementById('btnViaje');
            const btnCan = document.getElementById('btnCancelar');
            if (watchViaje === null) {
                kmViajeActual = 0; lastPosViaje = null;
                watchViaje = navigator.geolocation.watchPosition((p) => {
                    if (lastPosViaje) {
                        const d = calcularDistancia(lastPosViaje, p);
                        if (d > 0.002) { kmViajeActual += d; actualizarUI(); }
                    }
                    lastPosViaje = p;
                }, null, { enableHighAccuracy: true });
                btn.innerText = "Finalizar"; btn.classList.add('btn-active');
                btnCan.classList.remove('hidden');
            } else {
                navigator.geolocation.clearWatch(watchViaje); watchViaje = null;
                let cobro = prompt("Monto cobrado:");
                if (cobro && !isNaN(cobro)) registrarViaje(parseFloat(cobro), kmViajeActual);
                kmViajeActual = 0;
                btn.innerText = "Iniciar Viaje"; btn.classList.remove('btn-active');
                btnCan.classList.add('hidden');
                actualizarUI();
            }
        }

        function registrarViaje(cobro, km) {
            const tax = cobro * 0.16225; // Impuesto sugerido
            const gas = (km / config.kmL) * config.precioGas;
            const mant = km * config.mantKm;
            const neta = cobro - tax - gas - mant;
            kmPasajeCerrado += km;
            totalNetoDay += neta;
            historialViajes.unshift({ hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), km: km.toFixed(2), u: neta.toFixed(2), cobro: cobro });
            actualizarUI();
        }

        function registrarGastoManual() {
            const concepto = document.getElementById('gastoConcepto').value;
            const monto = parseFloat(document.getElementById('gastoMonto').value);
            if (concepto && !isNaN(monto)) {
                detalleGastos.unshift({ concepto, monto, hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
                gastosExtra += monto;
                document.getElementById('gastoConcepto').value = ""; document.getElementById('gastoMonto').value = "";
                localStorage.setItem('detalleGastos', JSON.stringify(detalleGastos));
                localStorage.setItem('gastosExtra', gastosExtra);
                actualizarUI();
            }
        }

        function eliminarGasto(index) {
            if(confirm("¿Eliminar gasto?")) {
                gastosExtra -= detalleGastos[index].monto;
                detalleGastos.splice(index, 1);
                localStorage.setItem('detalleGastos', JSON.stringify(detalleGastos));
                localStorage.setItem('gastosExtra', gastosExtra);
                actualizarUI();
            }
        }

        function actualizarUI() {
            localStorage.setItem('kmTotalJornadaGps', kmTotalJornadaGps);
            localStorage.setItem('kmPasajeCerrado', kmPasajeCerrado);
            localStorage.setItem('totalNetoDay', totalNetoDay);
            localStorage.setItem('historialViajes', JSON.stringify(historialViajes));
            localStorage.setItem('inicioJornada', inicioJornada);

            // CÁLCULOS DE COSTOS EN TIEMPO REAL (Sobre KM Total de la Jornada)
            const sumGasolina = (kmTotalJornadaGps / config.kmL) * config.precioGas;
            const sumDesgaste = kmTotalJornadaGps * config.mantKm;

            document.getElementById('kmTotalesGps').innerText = kmTotalJornadaGps.toFixed(2);
            document.getElementById('kmPasajeGps').innerText = (kmPasajeCerrado + kmViajeActual).toFixed(2);
            document.getElementById('totalNeto').innerText = "$ " + (totalNetoDay - gastosExtra).toFixed(2);
            
            // Actualizar textos de costos
            document.getElementById('costoGasolina').innerText = "$ " + sumGasolina.toFixed(2);
            document.getElementById('costoDesgaste').innerText = "$ " + sumDesgaste.toFixed(2);

            let brutoTotal = 0; 
            historialViajes.forEach(v => brutoTotal += parseFloat(v.cobro));
            document.getElementById('txtCantViajes').innerText = `Llevas ${historialViajes.length} viajes`;
            document.getElementById('txtMontoBruto').innerText = `$ ${brutoTotal.toFixed(2)}`;

            const kmProd = kmPasajeCerrado + kmViajeActual;
            const bar = document.getElementById('barEficiencia');
            if (kmTotalJornadaGps > 0) {
                const porc = Math.min(100, (kmProd / kmTotalJornadaGps) * 100);
                bar.style.width = porc + "%";
                document.getElementById('txtPorcentaje').innerText = Math.round(porc) + "%";
                bar.classList.remove('oro');
                if(porc >= 85) bar.classList.add('oro');
                else if(porc > 50) bar.style.background = "#22c55e";
                else if(porc > 25) bar.style.background = "#fbbf24";
                else bar.style.background = "#ef4444";
            }

            const meta = parseFloat(document.getElementById('metaIngreso').value) || 1;
            document.getElementById('progresoMeta').style.width = Math.min(100, (brutoTotal/meta)*100) + "%";

            const btnF = document.getElementById('btnFichaje');
            btnF.innerText = jornadaActiva ? "Cerrar Turno" : "Comenzar Turno";
            btnF.classList.toggle('text-green-500', jornadaActiva);

            document.getElementById('miniListaGastos').innerHTML = detalleGastos.map((g, i) => `
                <div class="flex justify-between text-[9px] border-b border-zinc-800 pb-1">
                    <span class="text-gray-500">${g.concepto}</span>
                    <span class="text-purple-400 font-bold">-$${g.monto} <button onclick="eliminarGasto(${i})" class="text-red-900 ml-1">✕</button></span>
                </div>`).join("");

            document.getElementById('listaViajes').innerHTML = historialViajes.map(v => `
                <div class="card p-2 flex justify-between items-center border-l-2 border-blue-600 mb-1">
                    <div class="text-left">
                        <span class="text-[10px] text-white font-bold">${v.km} KM</span>
                        <p class="text-[8px] text-gray-500">Bruto: $${v.cobro}</p>
                    </div>
                    <span class="text-green-500 font-black text-xs">Neto: +$${v.u}</span>
                </div>`).join("");
        }

        function calcularDistancia(p1, p2) {
            const R = 6371;
            const dLat = (p2.coords.latitude - p1.coords.latitude) * Math.PI/180;
            const dLon = (p2.coords.longitude - p1.coords.longitude) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.coords.latitude*Math.PI/180)*Math.cos(p2.coords.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function cancelarError() {
            if(confirm("¿Cancelar viaje actual?")) {
                navigator.geolocation.clearWatch(watchViaje); watchViaje = null;
                kmViajeActual = 0;
                document.getElementById('btnViaje').innerText = "Iniciar Viaje";
                document.getElementById('btnViaje').classList.remove('btn-active');
                document.getElementById('btnCancelar').classList.add('hidden');
                actualizarUI();
            }
        }

        setInterval(() => {
            document.getElementById('relojActual').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
            if (jornadaActiva) {
                const diff = Date.now() - inicioJornada;
                const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
                document.getElementById('tiempoJornada').innerText = `En línea: ${h}h ${m}m`;
            } else { document.getElementById('tiempoJornada').innerText = "Fuera de servicio"; }
        }, 1000);

        function toggleSettings(show) {
            const m = document.getElementById('modalSettings');
            if(show) {
                document.getElementById('setPrecioGas').value = config.precioGas;
                document.getElementById('setKmPorLitro').value = config.kmL;
                document.getElementById('setMantKm').value = config.mantKm;
                m.style.display = 'flex';
            } else {
                config.precioGas = parseFloat(document.getElementById('setPrecioGas').value) || 24;
                config.kmL = parseFloat(document.getElementById('setKmPorLitro').value) || 14;
                config.ma
