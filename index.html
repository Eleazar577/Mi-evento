<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobanana v4.5 Logistics 🍌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .card { background: #161616; border-radius: 20px; border: 1px solid #2a2a2a; padding: 15px; }
        #map { height: 250px; width: 100%; border-radius: 20px; border: 1px solid #333; z-index: 10; }
        .btn-active { animation: pulse 1.2s infinite; background-color: #dc2626 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .transition-bar { transition: width 0.8s ease-in-out; }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-end mb-4 px-1">
            <div>
                <h1 class="text-[9px] font-black text-yellow-500 tracking-[0.2em] uppercase">Logistics Edition</h1>
                <p id="relojActual" class="text-4xl font-black text-white leading-none">00:00</p>
            </div>
            <div class="text-right">
                <p id="tiempoJornada" class="text-xl font-black text-yellow-500">00:00</p>
            </div>
        </div>

        <div id="map" class="mb-4 shadow-2xl shadow-blue-900/10"></div>

        <div class="card mb-3 bg-zinc-900/50">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[8px] font-bold text-green-500 uppercase tracking-tighter">Utilidad Neta</span>
                <span id="totalNeto" class="text-2xl font-black text-white">$ 0.00</span>
            </div>
            <div class="w-full h-2.5 bg-zinc-800 rounded-full flex overflow-hidden border border-white/5">
                <div id="barUtilidad" class="bg-green-500 transition-bar" style="width: 100%"></div>
                <div id="barGastos" class="bg-orange-600 transition-bar" style="width: 0%"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <button id="btnViaje" onclick="toggleViaje()" class="col-span-2 h-16 bg-blue-600 rounded-2xl font-black text-lg uppercase shadow-lg shadow-blue-900/30">
                Iniciar Viaje
            </button>
            <div class="card p-2 text-center">
                <p class="text-[7px] text-gray-500 uppercase">Distancia Total</p>
                <p id="totalKm" class="text-sm font-black text-white">0.00 km</p>
            </div>
            <div class="card p-2 text-center">
                <p class="text-[7px] text-gray-500 uppercase">Ingreso Bruto</p>
                <p id="txtMontoBruto" class="text-sm font-black text-green-500">$ 0.00</p>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="compartirWhatsApp()" class="flex-1 bg-zinc-800 h-10 rounded-xl text-[10px] font-bold uppercase border border-zinc-700">Compartir Reporte</button>
            <button onclick="limpiarTodo()" class="w-12 bg-red-900/20 h-10 rounded-xl flex items-center justify-center border border-red-900/40">🗑️</button>
        </div>

        <h3 class="text-[10px] font-black uppercase text-gray-600 mb-3 tracking-widest px-1 text-center italic">Historial Visual de Rutas</h3>
        <div id="listaViajes" class="space-y-2"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, activeLine, deadLine, deadCoords = [], activeCoords = [];
        let watchId = null, lastPos = null, kmViajeActual = 0, isViajeActivo = false;
        
        let config = { precioGas: 24.5, kmL: 12, mantKm: 0.60 };
        let totalKmDay = parseFloat(localStorage.getItem('totalKmDay')) || 0;
        let totalNetoDay = parseFloat(localStorage.getItem('totalNetoDay')) || 0;
        let historialViajes = JSON.parse(localStorage.getItem('historialViajes')) || [];
        let inicioJornada = parseInt(localStorage.getItem('inicioJornada')) || Date.now();

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([20.66, -103.34], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            marker = L.circleMarker([0,0], { radius: 7, color: '#fff', fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
            
            // Línea azul para pasaje, roja para KM muertos
            activeLine = L.polyline([], { color: '#3b82f6', weight: 5, opacity: 0.8 }).addTo(map);
            deadLine = L.polyline([], { color: '#ef4444', weight: 3, opacity: 0.5, dashArray: '5, 10' }).addTo(map);

            // Cargar mapa de calor (puntos donde terminaron los viajes)
            historialViajes.forEach(v => {
                if(v.lat && v.lng) {
                    L.circle([v.lat, v.lng], { radius: 100, color: 'yellow', opacity: 0.2, fillOpacity: 0.1 }).addTo(map);
                }
            });

            startGPS();
        }

        function startGPS() {
            watchId = navigator.geolocation.watchPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                map.panTo(pos);
                marker.setLatLng(pos);

                if (lastPos) {
                    const d = calcularDistancia(lastPos.coords, p.coords);
                    if (d > 0.007) { // Sensibilidad 7 metros
                        totalKmDay += d;
                        if(isViajeActivo) {
                            kmViajeActual += d;
                            activeCoords.push(pos);
                            activeLine.setLatLngs(activeCoords);
                        } else {
                            deadCoords.push(pos);
                            deadLine.setLatLngs(deadCoords);
                        }
                        updateDisplay();
                        saveData();
                    }
                }
                lastPos = p;
            }, null, { enableHighAccuracy: true });
        }

        function toggleViaje() {
            const btn = document.getElementById('btnViaje');
            if (!isViajeActivo) {
                isViajeActivo = true;
                kmViajeActual = 0;
                activeCoords = [];
                activeLine.setLatLngs([]);
                btn.innerText = "Finalizar Viaje";
                btn.classList.add('btn-active');
            } else {
                isViajeActivo = false;
                let cobro = prompt("Cobro del viaje ($):");
                if (cobro) registrarViaje(parseFloat(cobro), kmViajeActual, lastPos.coords);
                btn.innerText = "Iniciar Viaje";
                btn.classList.remove('btn-active');
                activeLine.setLatLngs([]);
            }
        }

        function registrarViaje(c, k, coords) {
            const tax = c * 0.16225;
            const gas = (k / config.kmL) * config.precioGas;
            const neta = c - tax - gas - (k * config.mantKm);
            
            const nuevoViaje = {
                id: Date.now(),
                hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                km: k.toFixed(2),
                u: neta.toFixed(2),
                cobro: c,
                lat: coords.latitude,
                lng: coords.longitude,
                ruta: activeCoords // Guardamos la ruta del viaje
            };
            
            historialViajes.unshift(nuevoViaje);
            totalNetoDay += neta;
            
            // Agregar punto al mapa de calor
            L.circle([coords.latitude, coords.longitude], { radius: 100, color: 'yellow', opacity: 0.3 }).addTo(map);
            
            saveData();
            updateDisplay();
        }

        // Función para mostrar una ruta pasada en el mapa
        function verRuta(id) {
            const v = historialViajes.find(x => x.id === id);
            if(v && v.ruta.length > 0) {
                L.polyline(v.ruta, { color: '#fbbf24', weight: 6, opacity: 1 }).addTo(map);
                map.fitBounds(L.polyline(v.ruta).getBounds());
                alert(`Mostrando ruta de las ${v.hora}. Recorrido: ${v.km} KM`);
            }
        }

        function calcularDistancia(p1, p2) {
            const R = 6371;
            const dLat = (p2.latitude - p1.latitude) * Math.PI/180;
            const dLon = (p2.longitude - p1.longitude) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.latitude*Math.PI/180)*Math.cos(p2.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function updateDisplay() {
            document.getElementById('totalKm').innerText = totalKmDay.toFixed(2) + " km";
            document.getElementById('totalNeto').innerText = "$ " + totalNetoDay.toFixed(2);
            let bruto = historialViajes.reduce((acc, v) => acc + v.cobro, 0);
            document.getElementById('txtMontoBruto').innerText = "$ " + bruto.toFixed(2);
            
            const porc = bruto > 0 ? Math.max(0, (totalNetoDay / bruto) * 100) : 100;
            document.getElementById('barUtilidad').style.width = porc + "%";
            document.getElementById('barGastos').style.width = (100 - porc) + "%";

            document.getElementById('listaViajes').innerHTML = historialViajes.map(v => `
                <div class="card p-3 flex justify-between items-center mb-1 border-l-4 border-blue-600">
                    <div>
                        <span class="text-[8px] text-gray-500 font-bold">${v.hora}</span>
                        <p class="text-xs font-black text-white">${v.km} KM</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="verRuta(${v.id})" class="text-[15px] grayscale opacity-50 hover:grayscale-0 hover:opacity-100">🗺️</button>
                        <p class="text-green-500 font-black text-sm">$${v.u}</p>
                    </div>
                </div>`).join("");
        }

        function saveData() {
            localStorage.setItem('totalKmDay', totalKmDay);
            localStorage.setItem('totalNetoDay', totalNetoDay);
            localStorage.setItem('historialViajes', JSON.stringify(historialViajes));
        }

        function compartirWhatsApp() {
            const t = `*REPORTE LOGISTICS*\n💰 Neto: $${totalNetoDay.toFixed(2)}\n🚗 KM Total: ${totalKmDay.toFixed(2)}km\n🏁 Servicios: ${historialViajes.length}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
        }

        function limpiarTodo() { if(confirm("¿Reiniciar jornada?")) { localStorage.clear(); location.reload(); } }

        setInterval(() => {
            document.getElementById('relojActual').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
            const d = Date.now() - inicioJornada;
            const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000);
            document.getElementById('tiempoJornada').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        }, 1000);

        initMap();
        updateDisplay();
    </script>
</body>
</html>
